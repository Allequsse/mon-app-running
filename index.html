<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunDash Pro - Calendrier & Charge</title>
    <style>
        :root { --primary: #e67e22; --dark: #2c3e50; --light: #ecf0f1; --sidebar-w: 200px; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--light); }
        nav { width: var(--sidebar-w); background: var(--dark); color: white; display: flex; flex-direction: column; padding: 20px 0; }
        .nav-item { padding: 15px 25px; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; }
        .nav-item.active { background: #34495e; border-left: 4px solid var(--primary); }
        main { flex: 1; padding: 30px; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Grille Calendrier */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px; }
        .day-card { background: white; border: 1px solid #ddd; border-radius: 8px; min-height: 120px; padding: 10px; position: relative; }
        .day-name { font-weight: bold; font-size: 0.8rem; color: #7f8c8d; text-transform: uppercase; }
        .load-badge { position: absolute; bottom: 10px; right: 10px; background: var(--primary); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }
        .session-item { font-size: 0.7rem; background: #eef2f3; padding: 4px; margin-top: 5px; border-radius: 4px; border-left: 3px solid var(--primary); }
        
        .stats-bar { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: var(--dark); color: white; padding: 15px; border-radius: 10px; flex: 1; text-align: center; }
        .stat-box span { display: block; font-size: 1.5rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <nav>
        <h2 style="text-align:center">RunDash</h2>
        <div class="nav-item active" onclick="showTab('tab-planning')">Planning</div>
        <div class="nav-item" onclick="showTab('tab-settings')">Paramètres</div>
    </nav>

    <main>
        <div id="tab-planning" class="tab-content active">
            <div class="stats-bar">
                <div class="stat-box">Charge Hebdomadaire <span id="weekly-load">0</span></div>
                <div class="stat-box">Séances <span id="session-count">0</span></div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content: space-between; align-items: center;">
                    <h1>Semaine en cours</h1>
                    <button onclick="addSessionPrompt()" style="padding:10px; cursor:pointer">+ Ajouter Séance</button>
                </div>
                <div class="calendar-grid" id="calendar">
                    </div>
            </div>
        </div>

        <div id="tab-settings" class="tab-content">
            <h1>Paramètres Physiologiques</h1>
            <div class="card">
                <label>Fréquence Cardiaque au SV1 (BPM)</label>
                <input type="number" id="hr_sv1" value="145" style="width:100%; padding:10px; margin-bottom:15px;">
                <label>Fréquence Cardiaque au SV2 (BPM)</label>
                <input type="number" id="hr_sv2" value="165" style="width:100%; padding:10px; margin-bottom:15px;">
                <button onclick="saveSettings()" style="width:100%; padding:10px; background:green; color:white; border:none; border-radius:5px; cursor:pointer">Enregistrer</button>
            </div>
        </div>
    </main>

<script>
    let sessions = JSON.parse(localStorage.getItem('runSessions')) || [];
    let settings = JSON.parse(localStorage.getItem('runSettings')) || { hr_sv1: 145, hr_sv2: 165 };

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function saveSettings() {
        settings.hr_sv1 = document.getElementById('hr_sv1').value;
        settings.hr_sv2 = document.getElementById('hr_sv2').value;
        localStorage.setItem('runSettings', JSON.stringify(settings));
        renderCalendar();
    }

    function calculateLoad(durationMin, avgHR) {
        let coeff = 1;
        if (avgHR >= settings.hr_sv2) coeff = 4;
        else if (avgHR >= settings.hr_sv1) coeff = 2;
        else coeff = 1;
        
        return Math.round(durationMin * coeff);
    }

    function addSessionPrompt() {
        const day = prompt("Jour (0=Lundi, 6=Dimanche)");
        const dur = prompt("Durée (minutes)");
        const hr = prompt("FC moyenne de la séance");
        
        if (day && dur && hr) {
            const load = calculateLoad(dur, hr);
            sessions.push({ day: parseInt(day), duration: dur, hr: hr, load: load });
            localStorage.setItem('runSessions', JSON.stringify(sessions));
            renderCalendar();
        }
    }

    function renderCalendar() {
        const calendar = document.getElementById('calendar');
        calendar.innerHTML = "";
        const days = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];
        let totalLoad = 0;

        days.forEach((name, index) => {
            const daySessions = sessions.filter(s => s.day === index);
            const dayLoad = daySessions.reduce((acc, s) => acc + s.load, 0);
            totalLoad += dayLoad;

            let sessionsHTML = daySessions.map(s => `<div class="session-item">${s.duration}min @ ${s.hr}bpm</div>`).join('');

            calendar.innerHTML += `
                <div class="day-card">
                    <div class="day-name">${name}</div>
                    ${sessionsHTML}
                    ${dayLoad > 0 ? `<div class="load-badge">${dayLoad} pts</div>` : ''}
                </div>
            `;
        });

        document.getElementById('weekly-load').innerText = totalLoad;
        document.getElementById('session-count').innerText = sessions.length;
    }

    renderCalendar();
</script>
</body>
</html>
