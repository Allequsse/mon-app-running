<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunDash - Mon App de Running</title>
    <style>
        :root { --primary: #e67e22; --dark: #2c3e50; --light: #ecf0f1; --sidebar-w: 200px; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--light); }
        
        /* Sidebar */
        nav { width: var(--sidebar-w); background: var(--dark); color: white; display: flex; flex-direction: column; padding: 20px 0; }
        nav h2 { text-align: center; font-size: 1.2rem; margin-bottom: 30px; color: var(--primary); }
        .nav-item { padding: 15px 25px; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; }
        .nav-item:hover { background: #34495e; }
        .nav-item.active { background: #34495e; border-left: 4px solid var(--primary); }

        /* Contenu principal */
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .tab-content { display: none; max-width: 800px; margin: 0 auto; }
        .tab-content.active { display: block; }

        /* Style des cartes et formulaires */
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { margin-top: 0; color: var(--dark); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        /* Boutons */
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-save { background: #27ae60; color: white; margin-top: 15px; width: 100%; }
        
        /* Liste des séances */
        .step { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid var(--primary); display: flex; gap: 15px; align-items: end; }
    </style>
</head>
<body>

    <nav>
        <h2>RunDash 🏃‍♂️</h2>
        <div class="nav-item active" onclick="showTab('tab-seance')">Ma Séance</div>
        <div class="nav-item" onclick="showTab('tab-planning')">Planning</div>
        <div class="nav-item" onclick="showTab('tab-settings')">Paramètres</div>
    </nav>

    <main>
        
        <div id="tab-seance" class="tab-content active">
            <h1>Créer une séance</h1>
            <div class="card">
                <div id="workout-steps"></div>
                <button class="btn btn-primary" onclick="addStep()" style="margin-top: 10px;">+ Ajouter un bloc</button>
                <button class="btn btn-save" onclick="downloadWorkout()" style="background: #2980b9;">💾 Exporter (.zwo)</button>
            </div>
        </div>

        <div id="tab-planning" class="tab-content">
            <h1>Planning d'entraînement</h1>
            <div class="card">
                <p>Ici s'affichera ton calendrier de la semaine.</p>
                <div style="height: 300px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #999;">
                    Module Calendrier en cours de développement...
                </div>
            </div>
        </div>

        <div id="tab-settings" class="tab-content">
            <h1>Mes Zones de Référence</h1>
            <div class="card">
                <div class="grid">
                    <div>
                        <label>VMA (km/h)</label>
                        <input type="number" id="vma" step="0.1" placeholder="ex: 16.5">
                    </div>
                    <div>
                        <label>FC Max (bpm)</label>
                        <input type="number" id="fcmax" placeholder="ex: 190">
                    </div>
                    <div>
                        <label>SV1 (Seuil Endurance)</label>
                        <input type="number" id="sv1_vitesse" placeholder="Vitesse km/h">
                        <input type="number" id="sv1_fc" placeholder="FC associée" style="margin-top:5px">
                    </div>
                    <div>
                        <label>SV2 (Seuil Anaérobie)</label>
                        <input type="number" id="sv2_vitesse" placeholder="Vitesse km/h">
                        <input type="number" id="sv2_fc" placeholder="FC associée" style="margin-top:5px">
                    </div>
                </div>
                <button class="btn btn-save" onclick="saveSettings()">Enregistrer mes profils</button>
            </div>
        </div>

    </main>

    <script>
        // --- LOGIQUE DES ONGLETS ---
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- GESTION DES PARAMÈTRES (LocalStorage) ---
        function saveSettings() {
            const settings = {
                vma: document.getElementById('vma').value,
                fcmax: document.getElementById('fcmax').value,
                sv1_v: document.getElementById('sv1_vitesse').value,
                sv1_fc: document.getElementById('sv1_fc').value,
                sv2_v: document.getElementById('sv2_vitesse').value,
                sv2_fc: document.getElementById('sv2_fc').value
            };
            localStorage.setItem('runSettings', JSON.stringify(settings));
            alert("Paramètres sauvegardés sur votre navigateur !");
        }

        function loadSettings() {
            const saved = localStorage.getItem('runSettings');
            if (saved) {
                const s = JSON.parse(saved);
                document.getElementById('vma').value = s.vma || '';
                document.getElementById('fcmax').value = s.fcmax || '';
                document.getElementById('sv1_vitesse').value = s.sv1_v || '';
                document.getElementById('sv1_fc').value = s.sv1_fc || '';
                document.getElementById('sv2_vitesse').value = s.sv2_v || '';
                document.getElementById('sv2_fc').value = s.sv2_fc || '';
            }
        }

        // --- GÉNÉRATEUR DE SÉANCE ---
        function addStep() {
            const container = document.getElementById('workout-steps');
            const div = document.createElement('div');
            div.className = 'step';
            div.innerHTML = `
                <div style="flex:2">
                    <label>Durée (sec)</label>
                    <input type="number" class="duration" value="300">
                </div>
                <div style="flex:2">
                    <label>Intensité</label>
                    <select class="type">
                        <option value="SteadyState">Endurance (SV1)</option>
                        <option value="Interval">Seuil (SV2)</option>
                        <option value="Recovery">Récupération</option>
                    </select>
                </div>
            `;
            container.appendChild(div);
        }

        function downloadWorkout() {
            // Logique de téléchargement similaire à la précédente
            alert("Fichier .zwo généré ! (Voir console)");
            // ... (Code XML ici)
        }

        // Initialisation
        loadSettings();
        addStep();
    </script>
</body>
</html>
